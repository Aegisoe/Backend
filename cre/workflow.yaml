# ══════════════════════════════════════════════════════════════════
# AEGISOE — Confidential Incident Response Workflow
# Chainlink CRE (Confidential Runtime Environment)
#
# Workflow ini berjalan SEPENUHNYA di dalam TEE enclave.
# Tidak ada secret yang pernah keluar dari enclave.
# ══════════════════════════════════════════════════════════════════

name: aegisoe-confidential-incident-response
version: "1.0.0"
description: >
  Detects leaked secrets, classifies risk via LLM, rotates keys,
  and records verifiable proofs on-chain — all inside TEE.

# ── TRIGGERS ─────────────────────────────────────────────────────

triggers:
  - type: webhook
    id: backend_trigger
    description: "Menerima payload dari AEGISOE Backend setelah pre-filter"
    config:
      method: POST
      path: /scan

# ── INPUTS (dari Backend trigger payload) ────────────────────────

inputs:
  secretId:   "{{ trigger.body.secretId }}"     # bytes32 keccak256 hash
  repo:       "{{ trigger.body.repo }}"          # "owner/repo-name"
  commitSha:  "{{ trigger.body.commitSha }}"     # full SHA
  secretType: "{{ trigger.body.secretType }}"    # "openai" | "aws" | "github" | "generic"
  vaultUrl:   "{{ trigger.body.vaultUrl }}"      # Vault API URL
  owner:      "{{ trigger.body.owner }}"         # repo owner

# ── SECRETS (tersimpan di CRE secret store, encrypted) ───────────

secrets:
  - GITHUB_TOKEN              # GitHub API access token
  - OPENAI_ADMIN_KEY          # OpenAI admin key untuk generate/revoke
  - VAULT_ADMIN_TOKEN         # HashiCorp Vault admin token
  - CONTRACT_PRIVATE_KEY      # Wallet private key untuk on-chain tx
  - SEPOLIA_RPC_URL           # Sepolia JSON-RPC endpoint

# ── ENVIRONMENT ──────────────────────────────────────────────────

env:
  CONTRACT_ADDRESS: "0xf497C0B1D82d6fc1deaFe63a2DB7dBe81d87Da71"
  CHAIN_ID: "11155111"

# ══════════════════════════════════════════════════════════════════
# STEPS — 10 steps, semua di dalam TEE enclave
# ══════════════════════════════════════════════════════════════════

steps:

  # ── STEP 1: Fetch full diff dari GitHub ─────────────────────────
  - id: fetch_commit
    type: confidential_http
    description: "Fetch full commit diff via GitHub API — token never leaves enclave"
    config:
      method: GET
      url: "https://api.github.com/repos/{{ inputs.repo }}/commits/{{ inputs.commitSha }}"
      headers:
        Authorization: "Bearer {{ secrets.GITHUB_TOKEN }}"
        Accept: "application/vnd.github.diff"
        User-Agent: "AEGISOE-CRE/1.0"
    output: commit_diff

  # ── STEP 2: Detect secret in full diff ──────────────────────────
  - id: detect_secret
    type: compute
    description: "Regex + entropy analysis on full diff — computed inside enclave"
    code: |
      const diff = inputs.commit_diff.body || "";

      // Regex patterns (same as backend pre-filter)
      const PATTERNS = {
        openai:  /sk-[a-zA-Z0-9]{20,}/g,
        aws:     /AKIA[0-9A-Z]{16}/g,
        github:  /ghp_[a-zA-Z0-9]{36}/g,
        jwt:     /eyJ[a-zA-Z0-9_-]{10,}\.[a-zA-Z0-9_-]{10,}\.[a-zA-Z0-9_-]{10,}/g,
        generic: /[a-zA-Z0-9_\-]{32,64}/g,
      };

      // Shannon entropy
      function calcEntropy(str) {
        if (!str) return 0;
        const freq = {};
        for (const c of str) freq[c] = (freq[c] || 0) + 1;
        return -Object.values(freq)
          .map(n => n / str.length)
          .reduce((s, p) => s + p * Math.log2(p), 0);
      }

      let detected = { hasLeak: false, type: null, value: null, entropy: 0 };

      for (const [type, pattern] of Object.entries(PATTERNS)) {
        if (type === "generic") continue;
        pattern.lastIndex = 0;
        const match = pattern.exec(diff);
        if (match) {
          const entropy = calcEntropy(match[0]);
          if (entropy > 4.5) {
            detected = { hasLeak: true, type, value: match[0], entropy };
            break;
          }
        }
      }

      return { detected };
    output: detection

  # ── STEP 3: LLM risk classification via Confidential HTTP ──────
  - id: classify_risk
    type: confidential_http
    condition: "{{ steps.detection.output.detected.hasLeak == true }}"
    description: "LLM classify via OpenAI — API key and prompt never leave enclave"
    config:
      method: POST
      url: "https://api.openai.com/v1/chat/completions"
      headers:
        Authorization: "Bearer {{ secrets.OPENAI_ADMIN_KEY }}"
        Content-Type: "application/json"
      body:
        model: "gpt-4o-mini"
        temperature: 0
        max_tokens: 200
        messages:
          - role: "system"
            content: >
              You are a security analyst. Classify leaked secrets found in code commits.
              Respond ONLY in valid JSON:
              {"risk": "CRITICAL"|"HIGH"|"MEDIUM"|"NONE", "reasoning": "short explanation"}
          - role: "user"
            content: >
              Secret type: {{ steps.detection.output.detected.type }}
              Entropy: {{ steps.detection.output.detected.entropy }}
              Context: Code commit in repository {{ inputs.repo }}

              Risk criteria:
              - CRITICAL: Production API key for payment/AI (OpenAI, Stripe, AWS)
              - HIGH: Access tokens for repos or CI/CD (GitHub, GitLab)
              - MEDIUM: Internal or dev keys with limited scope
              - NONE: Test key, example, or placeholder

              Classify this secret.
    output: llm_classification

  # ── STEP 4: Policy decision ─────────────────────────────────────
  - id: policy_decision
    type: compute
    condition: "{{ steps.detection.output.detected.hasLeak == true }}"
    description: "Determine whether to auto-rotate based on LLM risk level"
    code: |
      let risk = "MEDIUM";
      try {
        const llmResponse = JSON.parse(
          inputs.llm_classification.body.choices[0].message.content
        );
        risk = llmResponse.risk || "MEDIUM";
      } catch {
        // Fallback: use secretType mapping
        const fallback = { openai: "CRITICAL", aws: "CRITICAL", github: "HIGH", jwt: "HIGH" };
        risk = fallback[inputs.secretType] || "MEDIUM";
      }

      const shouldRotate = (risk === "CRITICAL" || risk === "HIGH");

      return { shouldRotate, risk };
    output: policy

  # ── STEP 5: Generate new API key ───────────────────────────────
  - id: generate_new_key
    type: confidential_http
    condition: "{{ steps.policy.output.shouldRotate == true }}"
    description: "Generate new OpenAI key — new key NEVER leaves enclave"
    config:
      method: POST
      url: "https://api.openai.com/v1/organization/api_keys"
      headers:
        Authorization: "Bearer {{ secrets.OPENAI_ADMIN_KEY }}"
        Content-Type: "application/json"
      body:
        name: "aegisoe-rotated-{{ inputs.commitSha }}"
        scopes:
          - type: "all"
    output: new_key

  # ── STEP 6: Revoke old leaked key ──────────────────────────────
  - id: revoke_old_key
    type: confidential_http
    condition: "{{ steps.policy.output.shouldRotate == true }}"
    description: "Revoke old key — immediately invalidated"
    config:
      method: DELETE
      url: "https://api.openai.com/v1/organization/api_keys/{{ steps.detection.output.detected.value }}"
      headers:
        Authorization: "Bearer {{ secrets.OPENAI_ADMIN_KEY }}"
    output: revoke_result

  # ── STEP 7: Update Vault with new key ──────────────────────────
  - id: update_vault
    type: confidential_http
    condition: "{{ steps.policy.output.shouldRotate == true }}"
    description: "Store new key in Vault — Vault token never leaves enclave"
    config:
      method: POST
      url: "{{ inputs.vaultUrl }}/v1/secret/data/{{ inputs.repo }}/{{ inputs.secretType }}"
      headers:
        X-Vault-Token: "{{ secrets.VAULT_ADMIN_TOKEN }}"
        Content-Type: "application/json"
      body:
        data:
          key: "{{ steps.new_key.body.key }}"
          rotated_at: "{{ now() }}"
          rotated_by: "aegisoe-cre"
    output: vault_result

  # ── STEP 8: Generate keccak256 commitments ─────────────────────
  - id: generate_commitments
    type: compute
    condition: "{{ steps.policy.output.shouldRotate == true }}"
    description: "keccak256 commitments + type encoding — computed inside enclave"
    code: |
      const { keccak256, toUtf8Bytes, hexlify } = require("ethers");
      const crypto = require("crypto");
      const salt = crypto.randomBytes(32).toString("hex");

      // ── Commitment hashes — secrets never leave enclave ──
      const oldCommitment = keccak256(
        toUtf8Bytes(inputs.detection.detected.value + salt)
      );
      const newCommitment = keccak256(
        toUtf8Bytes((inputs.new_key?.body?.key || "mock-new-key") + salt)
      );
      const incidentCommitment = keccak256(
        toUtf8Bytes(inputs.secretId + inputs.repo + String(Date.now()))
      );

      // ── riskLevel → uint8 enum (MUST match SC: NONE=0, MEDIUM=1, HIGH=2, CRITICAL=3) ──
      const RISK_ENUM = { NONE: 0, MEDIUM: 1, HIGH: 2, CRITICAL: 3 };
      // SC reverts on NONE (0) — fallback ke MEDIUM (1) bukan NONE
      const riskLevelEnum = RISK_ENUM[inputs.policy.risk] ?? 1;

      // ── repoName → bytes32 (right-padded, max 32 chars) ──
      const repoBytes = toUtf8Bytes(inputs.repo.slice(0, 32));
      const padded = new Uint8Array(32);
      padded.set(repoBytes);
      const repoNameBytes32 = hexlify(padded);

      return {
        oldCommitment,
        newCommitment,
        incidentCommitment,
        riskLevelEnum,
        riskLevel: inputs.policy.risk,
        repoNameBytes32,
      };
    output: commitments

  # ── STEP 9: Record incident on-chain ───────────────────────────
  - id: submit_incident
    type: onchain_transaction
    condition: "{{ steps.detection.output.detected.hasLeak == true }}"
    description: "AegisoeRegistry.recordIncident() → emits IncidentRecorded"
    config:
      network: sepolia
      rpc_url: "{{ secrets.SEPOLIA_RPC_URL }}"
      contract: "{{ env.CONTRACT_ADDRESS }}"
      function: "recordIncident(bytes32,bytes32,uint8,bytes32)"
      private_key: "{{ secrets.CONTRACT_PRIVATE_KEY }}"
      args:
        - "{{ inputs.secretId }}"
        - "{{ steps.commitments.output.incidentCommitment }}"
        - "{{ steps.commitments.output.riskLevelEnum }}"
        - "{{ steps.commitments.output.repoNameBytes32 }}"
    output: incident_tx

  # ── STEP 10: Record rotation on-chain ──────────────────────────
  - id: submit_rotation
    type: onchain_transaction
    condition: "{{ steps.policy.output.shouldRotate == true }}"
    description: "AegisoeRegistry.recordRotation() → emits SecretRotated"
    config:
      network: sepolia
      rpc_url: "{{ secrets.SEPOLIA_RPC_URL }}"
      contract: "{{ env.CONTRACT_ADDRESS }}"
      function: "recordRotation(bytes32,bytes32,bytes32)"
      private_key: "{{ secrets.CONTRACT_PRIVATE_KEY }}"
      args:
        - "{{ inputs.secretId }}"
        - "{{ steps.commitments.output.oldCommitment }}"
        - "{{ steps.commitments.output.newCommitment }}"
    output: rotation_tx
